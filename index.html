<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>登録</title>
  <!--
    特定保健指導フォローアップ — LIFF初回登録ページ（静的ホスト用 / GitHub Pages）
    ------------------------------------------------------------
    GASのWebアプリはHTMLをサンドボックスiframe内で配信するため liff.init() が
    正常に動かない。そのため LIFFのフロントだけを静的ホスト（GitHub Pages等）に置き、
    取得した userId は GAS の doPost（no-cors）へ送って参加者管理表に記録する。

    使い方:
      1) 下の LIFF_ID を、LINE Developers で発行した LIFF ID に置き換える
      2) このファイルを GitHub Pages で公開する
      3) 公開URLを LINE Developers の LIFFアプリ「エンドポイントURL」に設定する
    ------------------------------------------------------------
  -->
  <style>
    body { font-family: -apple-system, "Hiragino Kaku Gothic ProN", Meiryo, sans-serif;
           margin: 0; padding: 24px; line-height: 1.8; color: #333; background: #f7f9f8; text-align: center; }
    .card { max-width: 480px; margin: 0 auto; background: #fff; border-radius: 12px;
            padding: 32px 24px; box-shadow: 0 1px 4px rgba(0,0,0,.08); }
    h1 { font-size: 1.2rem; color: #0F6E56; margin: 0 0 16px; }
    #closeBtn { display: none; margin-top: 24px; padding: 12px 28px; font-size: 1rem;
                color: #fff; background: #0F6E56; border: none; border-radius: 8px; cursor: pointer; }
    .err { color: #c0392b; }
  </style>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>
<body>
  <div class="card">
    <h1 id="title">登録処理中…</h1>
    <p id="msg">しばらくお待ちください。</p>
    <button id="closeBtn" onclick="closeLiff()">閉じる</button>
  </div>

  <script>
    // ▼▼▼ ここを自分の値に置き換える ▼▼▼
    var LIFF_ID = "2009000547-zt7quzgW"; // 例: "2009000495-xxxxxxxx"
    var WEBAPP_URL = "https://script.google.com/macros/s/AKfycbxZS64-juMLvZnXOCcKE9hyORJtvXU4NSXoKtToBrVPFYfbo2hinLVwXezFyy6uCSOo/exec";
    // ▲▲▲ ここまで ▲▲▲

    function step(m) { document.getElementById("msg").textContent = m; }
    function done(t, m) {
      document.getElementById("title").textContent = t;
      document.getElementById("msg").textContent = m;
      document.getElementById("closeBtn").style.display = "inline-block";
    }
    function fail(m) {
      document.getElementById("title").textContent = "登録できませんでした";
      document.getElementById("title").className = "err";
      document.getElementById("msg").textContent = m;
      document.getElementById("closeBtn").style.display = "inline-block";
    }
    function closeLiff() { if (window.liff && liff.closeWindow) liff.closeWindow(); }

    async function main() {
      try {
        if (typeof liff === "undefined") { fail("LIFF SDKが読み込めませんでした（通信環境をご確認ください）。"); return; }
        step("初期化中…");
        await liff.init({ liffId: LIFF_ID });
        step("ログイン確認中…");
        if (!liff.isLoggedIn()) { step("ログイン画面へ移動します…"); liff.login(); return; }
        var pid = new URLSearchParams(location.search).get("pid");
        if (!pid) { fail("参加者IDが取得できませんでした。配布されたURLから開いてください。"); return; }
        step("プロフィール取得中…");
        var profile = await liff.getProfile();
        step("登録を送信中…");
        // GASのdoPostへ no-cors で送信（応答は読めないが記録は行われる。結果は参加者管理表で確認）
        await fetch(WEBAPP_URL, { method: "POST", mode: "no-cors", body: JSON.stringify({ pid: pid, userId: profile.userId }) });
        done("登録が完了しました", "この画面を閉じてください。");
      } catch (err) {
        fail("[" + (err && err.message ? err.message : err) + "]");
      }
    }
    main();
  </script>
</body>
</html>
